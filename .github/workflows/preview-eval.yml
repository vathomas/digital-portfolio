name: CI — Stage B (post-deploy on Preview)

# Stage B of the Phase 3 quality-gate pipeline. Runs against the Vercel
# Preview URL after Stage A is green and Vercel has built the Preview.
# Two jobs run in parallel after the Preview is ready:
#   - ragas-eval  — Ragas evaluation gates faithfulness ≥ 0.80
#   - e2e         — Playwright smoke test of all 4 showcases
# Stage A (lint + typecheck + unit tests) lives in `.github/workflows/ci.yml`.
#
# Deployment Protection note:
#   Vercel Previews are auth-walled by default ("Vercel Authentication" under
#   Deployment Protection). To allow CI to reach the Preview URL, you have
#   two options:
#     A) Vercel dashboard → Project Settings → Deployment Protection →
#        Vercel Authentication → "Only Production Deployments".
#     B) Vercel dashboard → Project Settings → Deployment Protection →
#        Protection Bypass for Automation → generate a secret and add it
#        as a GitHub Actions secret named VERCEL_AUTOMATION_BYPASS_SECRET.
#   Option B is more secure (Preview URLs stay private to people, but CI
#   can still reach them via the bypass header).

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop, master]
  # Allow ragas-eval to be triggered manually from the Actions tab when the
  # CORPUS or eval/questions.jsonl actually changed. Ragas burns roughly
  # $0.75 per run (50 chat round-trips against Claude Sonnet plus the
  # gpt-4o-mini judge), so we don't want it firing on every PR.
  workflow_dispatch:
    inputs:
      preview_url:
        description: 'Vercel Preview (or Production) URL to evaluate against. e.g. https://digital-portfolio-xyz.vercel.app'
        required: true
        type: string

# Cancel any superseded run for the same PR — saves CI minutes when a PR
# is rapidly updated. Stage A has the same pattern, scoped to the ref.
concurrency:
  group: stage-b-${{ github.ref }}
  cancel-in-progress: true

# Default least-privilege. Individual jobs may need more (e.g. PR comments).
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1) Wait for Vercel to finish building the Preview deployment for this PR.
  #    Reads the GitHub Deployments API rather than polling the URL itself —
  #    that way Vercel's Deployment Protection (which 401s plain GET probes)
  #    cannot block this step.
  #
  #    On workflow_dispatch the user supplies a preview_url input directly,
  #    so this step skips the deployment lookup and forwards that URL.
  # ─────────────────────────────────────────────────────────────────────────
  await-vercel:
    name: Wait for Vercel Preview
    runs-on: ubuntu-latest
    permissions:
      deployments: read
    outputs:
      # One of these will be set depending on the trigger; the empty one
      # just contributes the empty string.
      preview-url: ${{ steps.vercel.outputs.url || steps.dispatched.outputs.url }}
    steps:
      - name: Use the dispatched preview URL
        if: github.event_name == 'workflow_dispatch'
        id: dispatched
        run: |
          url="${{ inputs.preview_url }}"
          echo "Using dispatched preview URL: $url"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Wait for the Vercel Preview deployment via GitHub Deployments API
        if: github.event_name != 'workflow_dispatch'
        id: vercel
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const maxAttempts = 60;       // 60 × 10s = 10 min
            const intervalMs  = 10_000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner, repo, sha,
                per_page: 30,
              });

              for (const deployment of deployments) {
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner, repo,
                  deployment_id: deployment.id,
                  per_page: 30,
                });

                // We want a SUCCESSful Preview deployment with a usable URL.
                // Vercel reports state='success' once the build is live.
                const success = statuses.find((s) => s.state === 'success');
                if (success) {
                  const url = success.environment_url || success.target_url;
                  if (url) {
                    core.info(`✅ Found Vercel Preview after ${attempt} attempt(s): ${url}`);
                    core.setOutput('url', url);
                    return;
                  }
                }

                // Surface failure states early — no point waiting 10 min if Vercel errored.
                const failed = statuses.find((s) =>
                  ['failure', 'error'].includes(s.state),
                );
                if (failed) {
                  core.setFailed(
                    `Vercel deployment ${deployment.id} reported state '${failed.state}'`,
                  );
                  return;
                }
              }

              core.info(`Attempt ${attempt}/${maxAttempts}: Preview not ready yet, sleeping…`);
              await new Promise((r) => setTimeout(r, intervalMs));
            }

            core.setFailed(
              `Timed out after ${maxAttempts} attempts waiting for a successful Vercel Preview deployment.`,
            );

  # ─────────────────────────────────────────────────────────────────────────
  # 2) Ragas evaluation — run the 50 Q&A pairs through /api/chat on the
  #    Preview, score with gpt-4o-mini, gate on faithfulness ≥ 0.80.
  #
  #    Cost-gated: only runs on manual workflow_dispatch. Every full run
  #    spends ~$0.75 in Anthropic credits (50 cold-start chat round-trips)
  #    plus a few cents of OpenAI usage for the gpt-4o-mini judge. Trigger
  #    it from the Actions tab after touching CORPUS or eval/questions.jsonl.
  # ─────────────────────────────────────────────────────────────────────────
  ragas-eval:
    name: Ragas evaluation
    needs: await-vercel
    runs-on: ubuntu-latest
    # Forks don't get secrets — skip the eval there. Owners can re-run
    # after merging to develop if a contributor opens a PR from a fork.
    # Also gate on workflow_dispatch so PR builds don't burn API credits.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: eval/requirements.txt

      - name: Install Ragas + dependencies
        run: pip install -r eval/requirements.txt

      - name: Run Ragas eval against the Preview
        env:
          # Judge LLM. Same key as runtime, but completely separate billing
          # path — only consumed by gpt-4o-mini scoring calls.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Optional: bypass Vercel Deployment Protection. If unset, the
          # Preview must be reachable without auth.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          python eval/ragas_eval.py \
            --base-url "${{ needs.await-vercel.outputs.preview-url }}"

      - name: Upload Ragas results
        # Always upload even when the gate fails — the JSON is the post-mortem.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-results
          path: eval/results.json
          retention-days: 30
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # 3) Playwright E2E — smoke test all 4 showcase routes against the Preview.
  #    Runs on PRs from the main repo (forks don't get secrets) but is
  #    skipped on manual workflow_dispatch since the dispatch flow is
  #    intended for re-running Ragas only.
  # ─────────────────────────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    needs: await-vercel
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests against the Preview
        env:
          BASE_URL: ${{ needs.await-vercel.outputs.preview-url }}
          # Optional: bypass Vercel Deployment Protection for E2E probes.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: warn
