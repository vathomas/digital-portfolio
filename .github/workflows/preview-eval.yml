name: CI — Stage B (post-deploy on Preview)

# Stage B of the Phase 3 quality-gate pipeline. Runs against the Vercel
# Preview URL after Stage A is green and Vercel has built the Preview.
# Two jobs run in parallel after the Preview is ready:
#   - ragas-eval  — Ragas evaluation gates faithfulness ≥ 0.80
#   - e2e         — Playwright smoke test of all 4 showcases
# Stage A (lint + typecheck + unit tests) lives in `.github/workflows/ci.yml`.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop, master]

# Cancel any superseded run for the same PR — saves CI minutes when a PR
# is rapidly updated. Stage A has the same pattern, scoped to the ref.
concurrency:
  group: stage-b-${{ github.ref }}
  cancel-in-progress: true

# Default least-privilege. Individual jobs may need more (e.g. PR comments).
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1) Wait for Vercel to finish building the Preview deployment for this PR.
  #    Outputs the Preview URL so the downstream jobs know where to point.
  # ─────────────────────────────────────────────────────────────────────────
  await-vercel:
    name: Wait for Vercel Preview
    runs-on: ubuntu-latest
    # No checkout needed — we only need the Vercel API.
    permissions:
      pull-requests: read
      statuses: read
    outputs:
      preview-url: ${{ steps.vercel.outputs.url }}
    steps:
      - name: Wait for the Vercel Preview deployment
        id: vercel
        # Pinned to a known-good release (avoid `@main` for security/repro).
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # 10 min covers a cold Vercel build with all integrations.
          max_timeout: 600
          # Match the GitHub Actions check name Vercel posts on the PR.
          check_interval: 10

  # ─────────────────────────────────────────────────────────────────────────
  # 2) Ragas evaluation — run the 50 Q&A pairs through /api/chat on the
  #    Preview, score with gpt-4o-mini, gate on faithfulness ≥ 0.80.
  # ─────────────────────────────────────────────────────────────────────────
  ragas-eval:
    name: Ragas evaluation
    needs: await-vercel
    runs-on: ubuntu-latest
    # Forks don't get secrets — skip the eval there. Owners can re-run
    # after merging to develop if a contributor opens a PR from a fork.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: eval/requirements.txt

      - name: Install Ragas + dependencies
        run: pip install -r eval/requirements.txt

      - name: Run Ragas eval against the Preview
        env:
          # Judge LLM. Same key as runtime, but completely separate billing
          # path — only consumed by gpt-4o-mini scoring calls.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python eval/ragas_eval.py \
            --base-url "${{ needs.await-vercel.outputs.preview-url }}"

      - name: Upload Ragas results
        # Always upload even when the gate fails — the JSON is the post-mortem.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-results
          path: eval/results.json
          retention-days: 30
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # 3) Playwright E2E — smoke test all 4 showcase routes against the Preview.
  # ─────────────────────────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    needs: await-vercel
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests against the Preview
        env:
          BASE_URL: ${{ needs.await-vercel.outputs.preview-url }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: warn
