name: CI — Stage A (pre-deploy)

# Stage A of the Phase 3 quality-gate pipeline. Runs on every PR and
# every push to develop/master. Stage B (Ragas + Playwright on the
# Vercel Preview) lands separately in `.github/workflows/preview-eval.yml`.

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

# Cancel any superseded run for the same ref — saves CI minutes when
# you push twice in a row.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with full history for diff scan)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: TruffleHog — scan working tree + git history
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # Scan the whole branch history on PRs and the latest commit on push.
          base: ${{ github.event.pull_request.base.sha || '' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --results=verified,unknown

  lint-typecheck-test:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint (zero-warning policy)
        run: npm run lint

      - name: Astro check (TypeScript across .astro files)
        run: npm run typecheck

      - name: Vitest unit tests
        run: npm test

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (verifies the full pipeline compiles end-to-end)
        run: npm run build
